<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BingX PH — Story 10 · Daily Market Update</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="_framework/styles.css">
<script src="_framework/image-slot.js"></script>
</head>
<body class="preview-mode">
  <!--
    DIRECTION SELECTOR — change the bg-action class below based on market sentiment.
      bullish day  →  class="story-1080 bg-action-profit"   (green glow)
      bearish day  →  class="story-1080 bg-action-loss"     (red glow)
      neutral / default  →  class="story-1080 bg-action"    (blue glow)
    The eyebrow and sub-caption sentiment field should match the chosen glow.
  -->
  <div class="story-1080 bg-action">
    <img class="top-watermark" src="../../assets/logos/bingx-wordmark-white.svg" alt="BingX">

    <div class="content-zone action">
      <div class="eyebrow">📈 MARKET UPDATE — [DATE]</div>

      <image-slot
        id="story-10-market-chart"
        shape="rounded" radius="16" fit="cover"
        placeholder="DROP MARKET CHART HERE"
        style="width: 100%; height: 720px;"></image-slot>

      <div class="caption-block">
        <h2 class="caption-headline">Where's the market today?</h2>
        <p class="caption-body">
          BTC sa <span class="num">[PRICE]</span>. ETH sa <span class="num">[PRICE]</span>. Sentiment: <span class="sentiment">[BULLISH / NEUTRAL / BEARISH]</span>. Full breakdown sa link.
        </p>
      </div>
    </div>

    <div class="risk">Market data updates daily. Trade with stop-loss.</div>
    <div class="cue"><span class="glyph">👆</span>Tap link for full analysis</div>
    <img class="watermark-bottom" src="../../assets/logos/bingx-wordmark-white.svg" alt="BingX">
  </div>

  <style>
    .caption-block { margin-top: 12px; }
    .caption-headline {
      font-size: 64px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin: 0 0 16px 0;
      color: var(--text-primary);
    }
    .caption-body {
      font-size: 32px;
      font-weight: 500;
      line-height: 1.4;
      color: #E5E7EB;
      margin: 0;
    }
    .sentiment {
      font-weight: 600;
      color: var(--brand-primary);
      letter-spacing: 0.02em;
    }
  </style>
</body>
</html>
