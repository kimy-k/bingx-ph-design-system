<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BingX PH — Story 05 · Campaign Countdown</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="_framework/styles.css">
<script src="_framework/image-slot.js"></script>
</head>
<body class="preview-mode">
  <div class="story-1080 bg-action">
    <img class="top-watermark" src="../../assets/logos/bingx-wordmark-white.svg" alt="BingX">

    <div class="content-zone action">
      <div class="eyebrow">⏰ CAMPAIGN ALERT</div>

      <image-slot
        id="story-05-campaign-banner"
        shape="rounded" radius="16" fit="cover"
        placeholder="DROP CAMPAIGN BANNER HERE"
        style="width: 100%; height: 720px;"></image-slot>

      <div class="caption-block">
        <h2 class="caption-headline"><span class="num">3 Days</span> Left</h2>
        <p class="caption-body">
          BingX deposit bonus campaign nag-eend ng <span class="num">[DATE]</span>. Don't miss your bonus USDT. Tap link to claim.
        </p>
      </div>
    </div>

    <div class="cue"><span class="glyph">👆</span>Tap to claim bonus</div>
    <img class="watermark-bottom" src="../../assets/logos/bingx-wordmark-white.svg" alt="BingX">
  </div>

  <style>
    .caption-block { margin-top: 12px; }
    .caption-headline {
      font-size: 80px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 16px 0;
      color: var(--text-primary);
    }
    .caption-headline .num { color: var(--brand-primary); }
    .caption-body {
      font-size: 32px;
      font-weight: 500;
      line-height: 1.4;
      color: #E5E7EB;
      margin: 0;
    }
  </style>
</body>
</html>
