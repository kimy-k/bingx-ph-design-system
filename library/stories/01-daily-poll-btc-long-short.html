<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BingX PH — Story 01 · Daily Poll · BTC Long or Short?</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="_framework/styles.css">
</head>
<body class="preview-mode">
  <div class="story-1080 bg-poll">
    <img class="top-watermark" src="../../assets/logos/bingx-wordmark-white.svg" alt="BingX">

    <div class="content-zone poll">
      <div class="eyebrow" style="margin-bottom: 32px;">DAILY POLL</div>
      <h1 class="headline">BTC bukas —<br>Long or Short?</h1>

      <div class="poll-row">
        <div class="poll-opt poll-long">
          <div class="poll-emoji">📈</div>
          <div class="poll-label profit">LONG</div>
          <div style="margin-top: 12px; font-size: 32px; font-weight: 600; color: var(--accent-profit); opacity: 0.85;">Tataas</div>
        </div>
        <div class="poll-opt poll-short">
          <div class="poll-emoji">📉</div>
          <div class="poll-label loss">SHORT</div>
          <div style="margin-top: 12px; font-size: 32px; font-weight: 600; color: var(--accent-loss); opacity: 0.85;">Bababa</div>
        </div>
      </div>
    </div>

    <div class="risk">Trading is risky. This poll is not financial advice.</div>
    <div class="cue"><span class="glyph">👆</span>Tap your prediction</div>
    <img class="watermark-bottom" src="../../assets/logos/bingx-wordmark-white.svg" alt="BingX">
  </div>
</body>
</html>
