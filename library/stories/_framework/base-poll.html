<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BingX PH — Story Base A · Poll</title>
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
</head>
<body class="preview-mode">
  <div class="story-1080 bg-poll">
    <img class="top-watermark" src="../../../assets/logos/bingx-wordmark-white.svg" alt="BingX">

    <div class="content-zone poll">
      <div class="eyebrow" style="margin-bottom: 32px;">DAILY POLL</div>
      <h1 class="headline">BTC: Long o<br>Short bukas?</h1>

      <div class="poll-row">
        <div class="poll-opt poll-long">
          <div class="poll-emoji">📈</div>
          <div class="poll-label profit">LONG</div>
        </div>
        <div class="poll-opt poll-short">
          <div class="poll-emoji">📉</div>
          <div class="poll-label loss">SHORT</div>
        </div>
      </div>
    </div>

    <div class="risk">Not financial advice. DYOR.</div>
    <div class="cue"><span class="glyph">👆</span>Tap your answer below</div>
    <img class="watermark-bottom" src="../../../assets/logos/bingx-wordmark-white.svg" alt="BingX">
  </div>
</body>
</html>
