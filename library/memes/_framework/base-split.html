<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BingX PH — Meme Base B · Split (Before/After)</title>
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="image-slot.js"></script>
</head>
<body class="preview-mode">
  <div class="meme-1080 meme-split">
    <div class="side">
      <image-slot
        id="meme-base-split-left"
        shape="rect"
        fit="cover"
        placeholder="DROP BEFORE PHOTO"></image-slot>
      <div class="side-label bad">Before</div>
    </div>
    <div class="side">
      <image-slot
        id="meme-base-split-right"
        shape="rect"
        fit="cover"
        placeholder="DROP AFTER PHOTO"></image-slot>
      <div class="side-label good">After</div>
    </div>
    <div class="divider"></div>

    <img class="watermark-light" src="../../../assets/logos/bingx-wordmark-white.svg" alt="BingX">
  </div>
</body>
</html>
