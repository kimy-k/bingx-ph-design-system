<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BingX PH — Meme Base C · Drake (Approve/Reject)</title>
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="image-slot.js"></script>
</head>
<body class="preview-mode">
  <div class="meme-1080 meme-drake">
    <!-- Row 1: reject -->
    <div class="cell row-1 col-1">
      <image-slot
        id="meme-base-drake-reject"
        shape="rect"
        fit="cover"
        placeholder="DROP ANNOYED FACE"></image-slot>
    </div>
    <div class="cell row-1 col-2 text">
      <div class="statement">Other exchanges with 20% commission</div>
    </div>

    <!-- Row 2: approve -->
    <div class="cell row-2 col-1">
      <image-slot
        id="meme-base-drake-approve"
        shape="rect"
        fit="cover"
        placeholder="DROP APPROVING FACE"></image-slot>
    </div>
    <div class="cell row-2 col-2 text">
      <div class="statement"><span class="accent">BingX</span> with 50% commission lifetime</div>
    </div>

    <img class="watermark-light" src="../../../assets/logos/bingx-wordmark-white.svg" alt="BingX">
  </div>
</body>
</html>
