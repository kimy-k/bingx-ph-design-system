<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BingX PH — Card 07 · BingX vs Other Exchanges</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  /* ===========================================================
     BingX PH · Library · Card 07 · "BingX vs Other Exchanges"
     Production export: 1080 × 1080 (square — IG / FB feed)

     COMPARISON variant. Headline at 72px so it sits on ONE line
     ("BingX vs Other Exchanges" fits at 72px Black -0.03em).
     Table = 3 equal columns; blue tint lives on .cell.bingx so it
     can't bleed past the column edge.
     =========================================================== */
  :root { --preview-scale: 0.6; }

  html, body { margin: 0; padding: 0; }
  body { background: #050811; font-family: 'Inter', sans-serif; }
  body.preview-mode {
    width: calc(1080px * var(--preview-scale));
    height: calc(1080px * var(--preview-scale));
    overflow: hidden;
  }
  body.preview-mode .card-1080 {
    transform: scale(var(--preview-scale));
    transform-origin: top left;
  }
  .card-1080 {
    width: 1080px;
    height: 1080px;
    background: var(--surface-elevated);
    color: var(--text-primary);
    padding: 96px 88px 96px;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
  }
  .brand-strip-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 14px;
    background: var(--brand-primary);
  }
  .category-tag {
    display: inline-block;
    background: var(--brand-primary-15);
    color: var(--brand-primary);
    padding: 14px 26px;
    border-radius: var(--radius-badge);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: var(--track-eyebrow);
    margin-bottom: 40px;
  }
  /* Headline: 72px so the full string fits on one line at -0.03em */
  .headline {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: var(--track-display-tight);
    margin: 0 0 48px 0;
    white-space: nowrap;          /* enforce single-line for this variant */
  }

  /* ---------- Comparison table ---------- */
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;       /* three equal columns */
    border-radius: 12px;
    overflow: hidden;                          /* clip the bingx column rounding */
  }
  .compare .row { display: contents; }

  .compare .cell {
    position: relative;
    padding: 22px 24px;                        /* row height reduced ~15% */
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 28px;
    font-weight: 600;                          /* Inter SemiBold throughout */
    line-height: 1.2;
  }
  .compare .row.header .cell { border-top: none; }

  /* Header row */
  .compare .cell.h {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: var(--track-eyebrow);
    text-transform: uppercase;
    color: var(--text-secondary);
    padding-top: 24px;
    padding-bottom: 24px;
  }
  .compare .cell.h.bingx { color: var(--brand-primary); }

  /* Per-column colors */
  .compare .cell.feature { color: var(--text-secondary); }
  .compare .cell.bingx   { color: var(--text-primary); }
  .compare .cell.others  { color: var(--text-muted); }

  /* Blue tint sits ON the bingx cells — can't bleed past column edge */
  .compare .cell.bingx {
    background: var(--brand-primary-15);
  }
  /* Round the top of the first .bingx cell, bottom of the last */
  .compare .row.header .cell.bingx { border-top-left-radius: 12px; border-top-right-radius: 12px; }
  .compare .row:last-child .cell.bingx { border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }

  /* Glyphs — checkmark blue, ✗ red */
  .glyph-check { color: var(--brand-primary); font-weight: 800; margin-right: 8px; }
  .glyph-x     { color: var(--accent-loss);   font-weight: 800; margin-right: 8px; }

  /* ---------- CTA / risk / watermark — locked master spec ---------- */
  .cta {
    position: absolute;
    bottom: 110px;
    left: 88px;
    right: 88px;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: -0.005em;
  }
  .cta-link { color: var(--brand-primary); font-weight: 700; }
  .risk {
    position: absolute;
    bottom: 52px;
    left: 88px;
    right: 300px;
    font-size: 19px;
    color: var(--text-secondary);
    font-weight: 500;
    line-height: 1.4;
  }
  .watermark {
    position: absolute;
    bottom: 48px;
    right: 88px;
    height: 40px;
    opacity: 0.55;
  }
</style>
</head>
<body class="preview-mode">
  <div class="card-1080">
    <div class="brand-strip-top"></div>

    <div class="category-tag">COMPARISON</div>

    <h1 class="headline">BingX vs Other Exchanges</h1>

    <div class="compare">
      <div class="row header">
        <div class="cell h"></div>
        <div class="cell h bingx">BingX</div>
        <div class="cell h others">Others</div>
      </div>
      <div class="row">
        <div class="cell feature">Copy Trading</div>
        <div class="cell bingx"><span class="glyph-check">✓</span>Built-in</div>
        <div class="cell others"><span class="glyph-x">✗</span>Limited / None</div>
      </div>
      <div class="row">
        <div class="cell feature">GCash Deposit</div>
        <div class="cell bingx"><span class="glyph-check">✓</span>Native</div>
        <div class="cell others"><span class="glyph-x">✗</span>Hassle</div>
      </div>
      <div class="row">
        <div class="cell feature">Min Deposit</div>
        <div class="cell bingx">₱500</div>
        <div class="cell others">₱5,000+</div>
      </div>
      <div class="row">
        <div class="cell feature">KOL Commission</div>
        <div class="cell bingx">50%</div>
        <div class="cell others">20–30%</div>
      </div>
      <div class="row">
        <div class="cell feature">Risk Protection</div>
        <div class="cell bingx">$300M Fund</div>
        <div class="cell others">Varies</div>
      </div>
    </div>

    <div class="cta">
      See the difference: <span class="cta-link">[REFERRAL_LINK]</span>
    </div>
    <div class="risk">
      Crypto trading is risky. Use money you can afford to lose.
    </div>
    <img src="../../assets/logos/bingx-wordmark-white.svg" alt="BingX" class="watermark">
  </div>
</body>
</html>
